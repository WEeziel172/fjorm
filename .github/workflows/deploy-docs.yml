name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            website/package-lock.json
            demo/package-lock.json

      - name: Install and build root package
        run: |
          npm ci
          npm run build

      - name: Install and build website
        run: |
          cd website
          npm ci
          npm run build

      - name: Install and build demo
        run: |
          cd demo
          npm ci
          npm run build

      - name: Copy demo into website build output
        run: cp -r demo/dist website/build/demo

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./website/build

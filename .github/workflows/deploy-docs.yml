name: Deploy Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: |
            yarn.lock
            website/yarn.lock
            demo/yarn.lock
            examples/antd/yarn.lock
            examples/mantine/yarn.lock
            examples/mui/yarn.lock

      - name: Install and build root package
        run: |
          yarn install --frozen-lockfile
          yarn build

      - name: Install and build demo
        run: |
          cd demo
          yarn install --frozen-lockfile
          yarn build

      - name: Install and build antd example
        run: |
          cd examples/antd
          yarn install --frozen-lockfile
          yarn build

      - name: Install and build mantine example
        run: |
          cd examples/mantine
          yarn install --frozen-lockfile
          yarn build

      - name: Install and build mui example
        run: |
          cd examples/mui
          yarn install --frozen-lockfile
          yarn build

      - name: Copy demo and examples into website static
        run: |
          mkdir -p website/static/demo
          mkdir -p website/static/examples/antd
          mkdir -p website/static/examples/mantine
          mkdir -p website/static/examples/mui
          cp -r demo/dist/* website/static/demo/
          cp -r examples/antd/dist/* website/static/examples/antd/
          cp -r examples/mantine/dist/* website/static/examples/mantine/
          cp -r examples/mui/dist/* website/static/examples/mui/

      - name: Install and build website
        run: |
          cd website
          yarn install --frozen-lockfile
          yarn build

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./website/build

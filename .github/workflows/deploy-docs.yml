name: Deploy Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: |
            yarn.lock
            website/yarn.lock

      - name: Install and build root package
        run: |
          yarn install --frozen-lockfile
          yarn build

      - name: Install and build playground
        run: |
          cd demo
          yarn install --frozen-lockfile
          yarn build

      - name: Copy playground into website static
        run: cp -r demo/dist/* website/static/demo/

      - name: Install and build website
        run: |
          cd website
          yarn install --frozen-lockfile
          yarn build

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./website/build

name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            website/package-lock.json
            demo/package-lock.json
            examples/antd/package-lock.json
            examples/mantine/package-lock.json
            examples/mui/package-lock.json

      - name: Install and build root package
        run: |
          npm ci
          npm run build

      - name: Install and build demo
        run: |
          cd demo
          npm ci
          npm run build

      - name: Install and build antd example
        run: |
          cd examples/antd
          npm ci
          npm run build

      - name: Install and build mantine example
        run: |
          cd examples/mantine
          npm ci
          npm run build

      - name: Install and build mui example
        run: |
          cd examples/mui
          npm ci
          npm run build

      - name: Copy demo and examples into website static
        run: |
          mkdir -p website/static/demo
          mkdir -p website/static/examples/antd
          mkdir -p website/static/examples/mantine
          mkdir -p website/static/examples/mui
          cp -r demo/dist/* website/static/demo/
          cp -r examples/antd/dist/* website/static/examples/antd/
          cp -r examples/mantine/dist/* website/static/examples/mantine/
          cp -r examples/mui/dist/* website/static/examples/mui/

      - name: Install and build website
        run: |
          cd website
          npm ci
          npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./website/build

name: PR Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-preview-deploy
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: |
            yarn.lock
            website/yarn.lock
            demo/yarn.lock

      - name: Install and build root package
        run: |
          yarn install --frozen-lockfile
          yarn build

      - name: Install and build demo
        run: |
          cd demo
          yarn install --frozen-lockfile
          VITE_BASE="/fjorm/pr-preview/${{ github.event.pull_request.number }}/demo/" yarn build

      - name: Configure and build website
        run: |
          cd website
          yarn install --frozen-lockfile
          sed -i "s|baseUrl: '/fjorm/'|baseUrl: '/fjorm/pr-preview/${{ github.event.pull_request.number }}/docs/'|" docusaurus.config.ts
          sed -i "s|https://weeziel172.github.io/fjorm/demo/|https://WEeziel172.github.io/fjorm/pr-preview/${{ github.event.pull_request.number }}/demo/|" docusaurus.config.ts
          yarn build

      - name: Deploy preview to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./demo/dist
          destination_dir: pr-preview/${{ github.event.pull_request.number }}/demo
          keep_files: true
          commit_message: 'deploy: PR preview #${{ github.event.pull_request.number }}'

      - name: Deploy website preview
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./website/build
          destination_dir: pr-preview/${{ github.event.pull_request.number }}/docs
          keep_files: true
          commit_message: 'deploy: PR preview #${{ github.event.pull_request.number }}'

      - name: Wait for Pages build
        uses: actions/github-script@v7
        with:
          script: |
            // Poll until the latest Pages build completes (status: "built")
            for (let i = 0; i < 24; i++) {
              await new Promise(r => setTimeout(r, 5000));
              const { data: build } = await github.rest.repos.getLatestPagesBuild({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              console.log(`Pages build status: ${build.status}`);
              if (build.status === 'built') break;
              if (i === 23) core.setFailed('Pages build did not complete within 2 minutes');
            }

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const demoUrl = `https://WEeziel172.github.io/fjorm/pr-preview/${prNumber}/demo/`;
            const docsUrl = `https://WEeziel172.github.io/fjorm/pr-preview/${prNumber}/docs/`;

            const body = `[PR #${prNumber} demo preview](${demoUrl})  \n[PR #${prNumber} docs preview](${docsUrl})`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('preview')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: `${body}\n\n_(updated for latest commit)_`,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
